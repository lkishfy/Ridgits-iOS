name: Ridgits
options:
  bundleIdPrefix: com.ridgits
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
targets:
  Ridgits:
    type: application
    platform: iOS
    sources:
      - Ridgits
    resources:
      - Ridgits/GoogleService-Info.plist
      - Ridgits/Secrets.example.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ridgits.app
        INFOPLIST_FILE: Ridgits/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ridgits/Ridgits.entitlements
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
